<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<label for="name">NOME COMPLETO:</label>
<input type="text" name="name">

<label for="email">E-MAIL:</label>
<input type="email" name="email">

<label for="senha">DIGITE SUA SENHA:</label>
<input type="password" name="senha">


<label for="date">DATA DE NASCIMENTO:</label>
<input type="date" name="date">

<label for="idade">SUA IDADE:</label>
<input type="date" name="idade" min="0" max="120">

<label for="color">COR FAVORITA:</label>
<input type="color" name="color">


<label for="GÊNERO">GÊNERO:</label>
<input type="radio" name="GÊNERO"> MASCULINO 
<input type="radio" name="GÊNERO"> FEMININO
<input type="radio" name="GÊNERO"> OUTRO

<br>

<label for="hobbies">HOBBIES:</label>
<input type="checkbox" name="hobbies" value="Futebol">
<input type="checkbox" name="hobbies" value="Praia">
<input type="checkbox" name="hobbies" value="Desenhar">



<label for="arquivo">UPLOAD DE ARQUIVO</label>
<input type="file" name="arquivo">


</body>
</html>
